<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminex — Coming Soon</title>
  <meta name="description" content="Cross over, come deeper.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,200;0,300;0,400;1,300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:              #0b0c0d;
      --bg-lift:         #15171a;
      --faint:           #565b5e;
      --muted:           #7c8286;
      --tan:             #9aa0a3;
      --warm:            #b7bcbf;
      --ink:             #d8dbdd;
      --bright:          #f2f4f5;
      --crimson:         #cc2f3d;
      --crimson-bright:  #e2616c;
      --crimson-deep:    #9e1f2a;
      --amber:           #c0843b;
      --border-hairline: rgba(124,130,134,.22);
      --border-strong:   rgba(124,130,134,.40);
      --font-display:    'Spectral', Georgia, serif;
      --font-mono:       'IBM Plex Mono', ui-monospace, monospace;
      --ease-out:        cubic-bezier(.16,1,.3,1);
      --radius-xs:       2px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-display);
      font-weight: 300;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
    }

    #springCanvas {
      display: block;
      margin: 0 auto 36px;
    }

    .wordmark {
      font-family: var(--font-display);
      font-weight: 200;
      font-size: 2.75rem;
      letter-spacing: 0.05em;
      color: var(--bright);
      text-align: center;
      line-height: .95;
      margin-bottom: 14px;
    }

    .tagline {
      font-family: var(--font-display);
      font-weight: 300;
      font-style: italic;
      font-size: 1.125rem;
      color: var(--tan);
      text-align: center;
      margin-bottom: 40px;
    }

    .rule {
      width: 36px;
      height: 1px;
      background: var(--crimson);
      margin: 0 auto 40px;
    }

    .lede {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 1.0625rem;
      color: var(--warm);
      text-align: center;
      max-width: 42ch;
      line-height: 1.68;
      margin: 0 auto 44px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
    }

    input[type="email"] {
      background: var(--bg-lift);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius-xs);
      color: var(--ink);
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 1rem;
      padding: 11px 16px;
      outline: none;
      transition: border-color 200ms var(--ease-out);
      width: 100%;
    }
    input[type="email"]::placeholder { color: var(--faint); }
    input[type="email"]:focus       { border-color: var(--border-strong); }

    button[type="submit"] {
      background: var(--crimson);
      border: none;
      border-radius: var(--radius-xs);
      color: var(--bright);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px 24px;
      transition: background 140ms var(--ease-out);
      width: 100%;
    }
    button[type="submit"]:hover  { background: var(--crimson-bright); }
    button[type="submit"]:active { background: var(--crimson-deep); }

    .success {
      display: none;
      text-align: center;
      font-style: italic;
      color: var(--warm);
      font-size: 1rem;
      max-width: 340px;
      margin: 0 auto;
      line-height: 1.62;
    }

    footer {
      margin-top: 72px;
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--faint);
      text-align: center;
    }
  </style>
</head>
<body>

  <canvas id="springCanvas" width="60" height="208"></canvas>

  <h1 class="wordmark">liminex</h1>
  <p class="tagline">Cross over, come deeper.</p>
  <div class="rule"></div>

  <p class="lede">
    Get close to ancient wisdom, today.
  </p>

  <form id="waitlistForm" action="https://formspree.io/f/REPLACE_WITH_FORM_ID" method="POST">
    <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
    <button type="submit">Notify me at launch</button>
  </form>

  <p class="success" id="successMsg">
    You're on the list.<br>We'll reach you when the crossing opens.
  </p>

  <footer>© 2026 Liminex</footer>

  <script>
    // Spring mark — side-on helix, tapering to amber core
    (function () {
      const canvas = document.getElementById('springCanvas');
      const ctx    = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const cx = W / 2;

      const LOOPS    = 5;
      const TOP      = 8;
      const BOTTOM   = H - 26;
      const SPRING_H = BOTTOM - TOP;
      const AMP0     = 21;   // amplitude at top
      const AMP1     = 5;    // amplitude at bottom
      const STEPS    = 400;

      // Draw spring line
      ctx.beginPath();
      for (let i = 0; i <= STEPS; i++) {
        const t   = i / STEPS;
        const y   = TOP + SPRING_H * t;
        const amp = AMP0 + (AMP1 - AMP0) * t * t;   // ease-in decay
        const x   = cx + amp * Math.sin(2 * Math.PI * LOOPS * t);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = '#f2f4f5';
      ctx.lineWidth   = 1.2;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.stroke();

      // Amber glow core
      const coreY = BOTTOM + 8;
      const glow  = ctx.createRadialGradient(cx, coreY, 0, cx, coreY, 13);
      glow.addColorStop(0,    'rgba(192,132,59,.95)');
      glow.addColorStop(0.4,  'rgba(192,132,59,.38)');
      glow.addColorStop(1,    'rgba(192,132,59,0)');
      ctx.beginPath();
      ctx.arc(cx, coreY, 13, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(cx, coreY, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#c0843b';
      ctx.fill();
    })();

    // Form: async submit to Formspree
    const form    = document.getElementById('waitlistForm');
    const success = document.getElementById('successMsg');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = form.querySelector('button');
      btn.textContent = 'sending…';
      btn.disabled = true;
      try {
        const res = await fetch(form.action, {
          method:  'POST',
          body:    new FormData(form),
          headers: { Accept: 'application/json' },
        });
        if (res.ok) {
          form.style.display    = 'none';
          success.style.display = 'block';
        } else {
          btn.textContent = 'try again';
          btn.disabled    = false;
        }
      } catch (_) {
        btn.textContent = 'try again';
        btn.disabled    = false;
      }
    });
  </script>
</body>
</html>
